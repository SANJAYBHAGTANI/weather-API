<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Project Documentation</title>

<link rel="stylesheet" href="APIProject.css">
<script src="https://kit.fontawesome.com/80e3c71521.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">
    <div class="title-area">
        <h1>which city weather do you want to know?</h1>
    </div>
    <div class="application-area">
        <div class="search-container">
            <input type="text" id="search-box" placeholder="enter city name...">
            <button id="search-button" onclick="TemShow()">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <div class="weather-result">
            <div class="result2">
                <img id="weather-icon" src="">
                <h4 id="sunrise"></h4>
                <h4 id="sunset"></h4>
            </div>
            <div class="result1">
                <h4 id="weather-city"></h4>
                <h4 id="weather-temperature"></h4>
                <h4 id="weather-description"></h4>
            </div>
        </div>
    </div>
</div>
<script src="APIProject.js"></script>
</body>
</html>
